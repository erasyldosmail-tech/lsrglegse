<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>
      Frontend Mentor | Newsletter sign-up form with success message
    </title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  </head>
  <body
    class="bg-slate-700 min-h-screen min-w-screen flex flex-col justify-center items-center"
  >
    <nav
      class="navi hidden flex-col absolute top-20 right-5 left-5 bg-white shadow-2xl p-8 rounded-lg z-50 md:hidden border border-gray-100"
    >
      <div class="flex flex-col gap-5 text-lg">
        <a href="#">Features</a>
        <a href="#">Company</a>
        <a href="#">Careers</a>
        <a href="#">About</a>
      </div>
    </nav>

    <div class="Buttons md:hidden z-[60]">
      <button class="btn-burger block">
        <img
          src="https://img.icons8.com/sf-regular/1200/menu.jpg"
          alt="open"
          class="h-10 w-10"
        />
      </button>

      <button class="btn-x hidden text-3xl font-bold text-white">
        &times;
      </button>
    </div>
    <div
      class="bg-white md:w-[900px] h-full md:h-[600px] rounded-3xl flex flex-col-reverse md:flex-row"
    >
      <div
        class="left md:w-1/2 flex flex-col items-start h-[600px] mx-5 md:m-10 md:ml-15 md:mt-20"
      >
        <h1 class="text-5xl font-semibold pb-4">Stay updated!</h1>
        <p class="py-5">
          Join 60,000+ product managers receiving monthly <br />
          updates on:
        </p>
        <div class="">
          <div class="flex items-center gap-3">
            <img
              src="assets/images/icon-success.svg"
              alt=""
              class="h-[20px] w-[20px]"
            />
            <h5>Product discovery and building what matters</h5>
          </div>
          <div class="flex items-center gap-3 py-3">
            <img
              src="assets/images/icon-success.svg"
              alt=""
              class="h-[20px] w-[20px]"
            />
            <h5>Measuring to ensure updates are a success</h5>
          </div>
          <div class="flex items-center gap-3">
            <img
              src="assets/images/icon-success.svg"
              alt=""
              class="h-[20px] w-[20px]"
            />
            <h5>And much more!</h5>
          </div>

          <div class="flex flex-col gap-5 w-full max-w-sm pt-10">
            <div class="flex flex-col gap-2">
              <label class="text-xs font-bold">Email address</label>
              <input
                type="email"
                placeholder="add your mail"
                class="border-3 border-slate-600 rounded-lg px-6 py-4"
              />
            </div>
            <button
              class="bg-gradient-to-r from-red-400 to-orange-400 text-white font-semibold p-5 rounded-lg cursor-pointer"
            >
              Subscribe to monthly newsletter
            </button>
          </div>
        </div>
      </div>
      <div class="md:right md:w-1/2 md:h-[600px] md:m-10">
        <div class="flex-1 w-full flex justify-center md:justify-end">
          <picture>
            <source
              media="(min-width: 768px)"
              srcset="assets/images/illustration-sign-up-desktop.svg"
            />

            <img
              src="assets/images/illustration-sign-up-mobile.svg"
              alt="Remote work hero image"
              class="block max-w-full h-auto object-cover"
            />
          </picture>
        </div>
      </div>
    </div>
    <script>
      const btnBurger = document.querySelector(".btn-burger");
      const btnX = document.querySelector(".btn-x");
      const nav = document.querySelector(".navi");

      const toggleMenu = () => {
        btnBurger.classList.toggle("hidden");

        btnX.classList.toggle("hidden");

        nav.classList.toggle("hidden");
        nav.classList.toggle("flex");
      };

      btnBurger.addEventListener("click", toggleMenu);
      btnX.addEventListener("click", toggleMenu);
    </script>
  </body>
</html>
