<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>
      Frontend Mentor | Newsletter sign-up form with success message
    </title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  </head>
  <body
    class="bg-slate-700 min-h-screen min-w-screen flex justify-center items-center"
  >
    <div class="bg-white w-[900px] h-[600px] rounded-3xl flex">
      <div
        class="left w-1/2 flex flex-col items-start h-[600px] m-10 ml-15 mt-20"
      >
        <h1 class="text-5xl font-semibold pb-4">Stay updated!</h1>
        <p class="py-5">
          Join 60,000+ product managers receiving monthly <br />
          updates on:
        </p>
        <div class="">
          <div class="flex items-center gap-3">
            <img
              src="assets/images/icon-success.svg"
              alt=""
              class="h-[20px] w-[20px]"
            />
            <h5>Product discovery and building what matters</h5>
          </div>
          <div class="flex items-center gap-3 py-3">
            <img
              src="assets/images/icon-success.svg"
              alt=""
              class="h-[20px] w-[20px]"
            />
            <h5>Measuring to ensure updates are a success</h5>
          </div>
          <div class="flex items-center gap-3">
            <img
              src="assets/images/icon-success.svg"
              alt=""
              class="h-[20px] w-[20px]"
            />
            <h5>And much more!</h5>
          </div>

          <div class="flex flex-col gap-5 w-full max-w-sm pt-10">
            <div class="flex flex-col gap-2">
              <label class="text-xs font-bold">Email address</label>
              <input
                type="email"
                placeholder="add your mail"
                class="border-3 border-slate-600 rounded-lg px-6 py-4"
              />
            </div>
            <button
              class="bg-gradient-to-r from-red-400 to-orange-400 text-white font-semibold p-5 rounded-lg cursor-pointer"
            >
              Subscribe to monthly newsletter
            </button>
          </div>
        </div>
      </div>
      <div class="right w-1/2 h-[600px] m-10">
        <img src="assets/images/illustration-sign-up-desktop.svg" alt="" />
      </div>
    </div>
    <!-- 
  

  

 
  
 

  Email address
  email@company.com

  Subscribe to monthly newsletter




  Thanks for subscribing!

  A confirmation email has been sent to ash@loremcompany.com. 
  Please open it and click the button inside to confirm your subscription.

  Dismiss message

  Success message end
   -->
  </body>
</html>
